name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # Varredura de segredos — independente do registro de pacotes, roda sempre.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Testes + build via npm. O package-lock.json resolve TODAS as dependências
  # (inclusive @lovable.dev/*) pelo registro público npmjs, então este job roda
  # sem precisar do LOVABLE_NPM_TOKEN — é a rede de segurança de fato.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      # Lint é informativo: o repo tem dívida pré-existente de formatação
      # (prettier) que não deve bloquear a rede de segurança de testes/build.
      - name: Lint (informativo)
        run: npm run lint
        continue-on-error: true

      - name: Testes
        run: npm run test

      - name: Build
        run: npm run build
