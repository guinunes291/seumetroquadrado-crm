name: CI

on:
  push:
    branches: ["main", "claude/**", "codex/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # Varredura de segredos — independente do registro de pacotes, roda sempre.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Testes + build via npm. O package-lock.json resolve TODAS as dependências
  # (inclusive @lovable.dev/*) pelo registro público npmjs, então este job roda
  # sem precisar do LOVABLE_NPM_TOKEN — é a rede de segurança de fato.
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      # Gate bloqueante sem os dois débitos legados já inventariados
      # (Prettier e no-explicit-any). O budget abaixo impede novos escapes de tipo.
      - name: Lint de correção
        run: npm run lint:ci

      - name: Formatação dos arquivos alterados
        run: npm run format:check

      - name: Budget de escapes de tipo
        run: npm run type-escape-budget

      - name: Typecheck
        run: npm run typecheck

      - name: Testes
        run: npm run test

      - name: Build
        run: npm run build

      - name: Budget de bundle
        run: npm run bundle-budget

      - name: Auditoria de dependências de produção
        run: npm audit --omit=dev --audit-level=high

  # Migrations + regras de negócio num Postgres REAL (auditoria 2026-07-19).
  # Fecha o gap estrutural das ondas anteriores: replay das migrations do zero
  # (shims de auth/storage/pg_cron/pg_net em scripts/db-harness) e a suíte
  # tests/db (RLS por papel, máquina de estados, aprovar_venda, distribuição,
  # dedup, follow-up, KPIs). Toda migration futura que quebrar o replay ou uma
  # regra testada quebra este job.
  db-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Subir Postgres do harness (extensões fake montadas)
        run: docker compose -f scripts/db-harness/docker-compose.yml up -d --wait

      - name: Aplicar shims + todas as migrations (replay do zero)
        run: bash scripts/db-harness/apply.sh
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54329/postgres

      - name: Suíte de banco (tests/db)
        run: npm run test:db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54329/postgres

  # Smoke do ARTEFATO DE PRODUÇÃO num navegador real. É o gate que faltava: build
  # verde não garante que o app renderiza. Boota o build (preset node-server, cujo
  # bundle client é idêntico ao Cloudflare) e reprova em tela branca, erro de
  # console fatal (useSyncExternalStore/ChunkLoadError/hidratação), chunk 404,
  # /auth sem formulário, `/` sem redirect, ou segredo no bundle. Sem credenciais.
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Instalar navegador do Playwright
        run: npx playwright install --with-deps chromium

      - name: Build (preset node-server, para bootar o artefato)
        run: npm run build
        env:
          NITRO_PRESET: node-server

      - name: Smoke no navegador
        run: npm run smoke
