name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # Varredura de segredos — independente do registro de pacotes, roda sempre.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # As deps incluem pacotes do registro privado do Lovable
      # (europe-west4-npm.pkg.dev / @lovable.dev/*). Configure o secret
      # LOVABLE_NPM_TOKEN no repositório para o install funcionar no CI.
      # Sem o token, este job falha no install — o secret-scan acima roda independente.
      - name: Configurar registro privado (se houver token)
        if: ${{ secrets.LOVABLE_NPM_TOKEN != '' }}
        run: |
          echo "//europe-west4-npm.pkg.dev/:_authToken=${{ secrets.LOVABLE_NPM_TOKEN }}" >> ~/.npmrc

      - name: Instalar dependências
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Testes
        run: bun run test

      - name: Build
        run: bun run build
