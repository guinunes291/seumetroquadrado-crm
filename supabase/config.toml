project_id = "rldnprwjlomjmjvinxuh"

# O CRM e somente por convite. Replicar esta configuracao no projeto Supabase
# vivo durante o rollout; a migration tambem mantém contas nao convidadas
# pendentes e sem papel como segunda camada de defesa.
[auth]
enable_signup = false

# Webhook público do Zapier (Facebook Lead Ads). Autenticação via LEAD_INTAKE_SECRET,
# não por JWT do Supabase.
[functions.lead-intake]
verify_jwt = false

# Fase 2 Sami — chamada server-to-server do n8n. Autenticação via header x-sami-key
# (secret SAMI_WRITE_KEY), não por JWT do Supabase.
[functions.sami-agendar-visita]
verify_jwt = false

[functions.sami-consultar-agenda]
verify_jwt = false

[functions.crm-convites]
verify_jwt = true
